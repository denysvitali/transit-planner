name: Transit Planner CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flutter:
    name: Flutter Analyze and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true
          pub-cache: true
          cache-key: "flutter-sdk-:os:-:channel:-:version:-:arch:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-:hash:"

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

  go:
    name: Go Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TRANSITLAND_API_KEY: ${{ secrets.TRANSITLAND_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Test
        run: go test ./...

      - name: Build c-shared library for Flutter FFI
        run: |
          mkdir -p build
          CGO_ENABLED=1 go build \
            -buildmode=c-shared \
            -o build/libtransit_planner.so \
            ./cmd/libtransitplanner
          test -f build/libtransit_planner.h
          nm -D build/libtransit_planner.so | grep -E '\bTP_(Route|Free)\b'

  build-go-android:
    name: Build Go FFI library for Android
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Cross-compile cmd/libtransitplanner for the Android ABIs that the
    # Flutter build will package. The output drops into jniLibs/<abi>/ so
    # build-android can shuffle it under android/app/src/main/jniLibs/ via
    # actions/download-artifact.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Build .so per ABI
        env:
          NDK_BIN: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          API: '24'
        run: |
          mkdir -p jniLibs/arm64-v8a jniLibs/x86_64
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
            CC=$NDK_BIN/aarch64-linux-android$API-clang \
            CXX=$NDK_BIN/aarch64-linux-android$API-clang++ \
            go build -buildmode=c-shared -trimpath \
              -o jniLibs/arm64-v8a/libtransit_planner.so \
              ./cmd/libtransitplanner
          CGO_ENABLED=1 GOOS=android GOARCH=amd64 \
            CC=$NDK_BIN/x86_64-linux-android$API-clang \
            CXX=$NDK_BIN/x86_64-linux-android$API-clang++ \
            go build -buildmode=c-shared -trimpath \
              -o jniLibs/x86_64/libtransit_planner.so \
              ./cmd/libtransitplanner
          "$NDK_BIN/llvm-strip" --strip-unneeded \
            jniLibs/arm64-v8a/libtransit_planner.so \
            jniLibs/x86_64/libtransit_planner.so
          file jniLibs/*/libtransit_planner.so

      - name: Upload Android FFI jniLibs
        uses: actions/upload-artifact@v7
        with:
          name: android-jnilibs
          path: jniLibs/
          retention-days: 14

  build-android:
    name: Build Android Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-go-android]
    env:
      KEYSTORE_KEY_ALIAS: upload
      TRANSITLAND_API_KEY: ${{ secrets.TRANSITLAND_API_KEY }}
    # Build a release APK for every commit pushed to a tracked branch, version
    # tags, and manual runs. PRs still build (via the default trigger) but do
    # not publish a GitHub Release.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine build metadata
        shell: bash
        id: build_meta
        run: |
          BUILD_NUMBER=$(( ${{ github.run_number }} * 100 + ${{ github.run_attempt }} ))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Check for keystore
        id: check_keystore
        shell: bash
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_STORE_PASSWORD" ] || [ -z "$KEYSTORE_KEY_PASSWORD" ]; then
            echo "ENABLED=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Release signing disabled — set KEYSTORE_BASE64, KEYSTORE_STORE_PASSWORD, and KEYSTORE_KEY_PASSWORD secrets to sign with a stable key."
            exit 0
          fi
          echo "ENABLED=true" >> "$GITHUB_OUTPUT"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Create keystore
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        shell: bash
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release-keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Resolve signing keystore
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        id: resolve_keystore
        shell: bash
        run: |
          KEYSTORE_STORE_PASSWORD="$(printf '%s' "$KEYSTORE_STORE_PASSWORD" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          KEYSTORE_KEY_PASSWORD="$(printf '%s' "$KEYSTORE_KEY_PASSWORD" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "$KEYSTORE_STORE_PASSWORD" ]; then
            echo "::error::KEYSTORE_STORE_PASSWORD is empty after trimming"
            exit 1
          fi

          KEYSTORE_LIST="$(keytool -list \
            -v \
            -keystore release-keystore.jks \
            -storepass "$KEYSTORE_STORE_PASSWORD" \
            2>&1 || true)"
          if [ -z "$KEYSTORE_LIST" ]; then
            echo "::error::Could not read keystore output from keytool"
            exit 1
          fi

          if echo "$KEYSTORE_LIST" | grep -qi "keystore password was incorrect"; then
            echo "::error::Invalid KEYSTORE_STORE_PASSWORD"
            exit 1
          fi

          if echo "$KEYSTORE_LIST" | grep -qi "keystore was tampered"; then
            echo "::error::Invalid KEYSTORE_STORE_PASSWORD"
            exit 1
          fi

          if echo "$KEYSTORE_LIST" | grep -qi "is not a valid keystore"; then
            echo "::error::release-keystore.jks is not a valid keystore or KEYSTORE_BASE64 is corrupt"
            exit 1
          fi

          mapfile -t AVAILABLE_ALIASES < <(
            printf '%s\n' "$KEYSTORE_LIST" \
            | sed -nE "s/^[[:space:]]*[Aa]lias[[:space:]]*name:[[:space:]]*([^,]+).*/\\1/p"
          )

          if [ "${#AVAILABLE_ALIASES[@]}" -eq 0 ]; then
            KEYSTORE_RFC_LIST="$(keytool -list \
              -rfc \
              -keystore release-keystore.jks \
              -storepass "$KEYSTORE_STORE_PASSWORD" \
              2>&1 || true)"
            mapfile -t AVAILABLE_ALIASES < <(
              printf '%s\n' "$KEYSTORE_RFC_LIST" \
              | sed -nE "s/^[[:space:]]*[Aa]lias:[[:space:]]*([^[:space:]]+).*/\\1/p"
            )
          fi

          if [ "${#AVAILABLE_ALIASES[@]}" -eq 0 ]; then
            echo "::error::Could not parse keystore aliases from keytool output"
            exit 1
          fi

          KEY_ALIAS="$KEYSTORE_KEY_ALIAS"
          if [ -n "$KEY_ALIAS" ]; then
            ALIAS_FOUND="false"
            for ALIAS in "${AVAILABLE_ALIASES[@]}"; do
              if [ "$ALIAS" = "$KEY_ALIAS" ]; then
                ALIAS_FOUND="true"
                break
              fi
            done
            if [ "$ALIAS_FOUND" != "true" ]; then
              KEY_ALIAS=""
            fi
          fi
          if [ -z "$KEY_ALIAS" ]; then
            echo "::warning::Configured key alias not found, using first available alias"
            KEY_ALIAS="${AVAILABLE_ALIASES[0]}"
          fi

          KEY_CANDIDATES=("${KEYSTORE_KEY_PASSWORD}" "${KEYSTORE_STORE_PASSWORD}")
          EFFECTIVE_KEY_PASSWORD=""
          for KEY_PASSWORD in "${KEY_CANDIDATES[@]}"; do
            if [ -z "$KEY_PASSWORD" ]; then
              continue
            fi
            if keytool -importkeystore \
              -srckeystore release-keystore.jks \
              -srcstorepass "$KEYSTORE_STORE_PASSWORD" \
              -srcalias "$KEY_ALIAS" \
              -srckeypass "$KEY_PASSWORD" \
              -destkeystore /tmp/release-keystore.resolved.p12 \
              -deststoretype PKCS12 \
              -deststorepass resolvedpass \
              -destkeypass resolvedpass \
              -noprompt; then
              EFFECTIVE_KEY_PASSWORD="$KEY_PASSWORD"
              RESOLVED_KEYSTORE_PASSWORD="resolvedpass"
              break
            fi
          done

          if [ -z "$EFFECTIVE_KEY_PASSWORD" ]; then
            echo "::error::Release keystore secrets are invalid"
            exit 1
          fi

          {
            echo "KEYSTORE_KEY_ALIAS=$KEY_ALIAS"
            echo "KEYSTORE_KEY_PASSWORD=$RESOLVED_KEYSTORE_PASSWORD"
            echo "KEYSTORE_STORE_PASSWORD=$RESOLVED_KEYSTORE_PASSWORD"
            echo "KEYSTORE_PATH=/tmp/release-keystore.resolved.p12"
          } >> "$GITHUB_OUTPUT"
        env:
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ env.KEYSTORE_KEY_ALIAS }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true
          pub-cache: true
          cache-key: "flutter-sdk-:os:-:channel:-:version:-:arch:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-:hash:"

      - name: Install icon generation deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin python3-pil

      - name: Generate app icons from SVG
        run: python3 tool/generate_app_icon.py

      - name: Download Android FFI jniLibs
        uses: actions/download-artifact@v8
        with:
          name: android-jnilibs
          path: android/app/src/main/jniLibs/

      - name: Verify Go FFI library is in place
        run: |
          find android/app/src/main/jniLibs -name 'libtransit_planner.so' -print
          test -f android/app/src/main/jniLibs/arm64-v8a/libtransit_planner.so

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ steps.resolve_keystore.outputs.KEYSTORE_PATH }}
          KEYSTORE_STORE_PASSWORD: ${{ steps.resolve_keystore.outputs.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ steps.resolve_keystore.outputs.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ steps.resolve_keystore.outputs.KEYSTORE_KEY_PASSWORD }}
        run: |
          flutter build apk --release --no-pub \
            --build-number ${{ steps.build_meta.outputs.BUILD_NUMBER }} \
            --dart-define=TRANSITLAND_API_KEY="$TRANSITLAND_API_KEY"

      - name: Verify Go FFI library is packaged in the APK
        run: |
          unzip -l build/app/outputs/flutter-apk/app-release.apk \
            | grep libtransit_planner.so

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: transit-planner-release-b${{ steps.build_meta.outputs.BUILD_NUMBER }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Determine release version
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: release_version
        run: |
          SEMVER=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1 | tr -d ' ')
          BUILD_NUMBER="${{ steps.build_meta.outputs.BUILD_NUMBER }}"
          RELEASE_TAG="v${SEMVER}+${BUILD_NUMBER}"
          RELEASE_NAME="Transit Planner v${SEMVER} (build ${BUILD_NUMBER})"
          echo "SEMVER=$SEMVER" >> $GITHUB_OUTPUT
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.RELEASE_TAG }}
          name: ${{ steps.release_version.outputs.RELEASE_NAME }}
          draft: false
          prerelease: true
          generate_release_notes: false
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
