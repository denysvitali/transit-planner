<?xml version="1.0" encoding="UTF-8"?>
<!--
  Source of truth for the Transit Planner app icon. Rasterized into the
  platform-specific PNG assets by tool/generate_app_icon.py at build time;
  see that script for the list of outputs. Colours track AppPalette in
  lib/src/theme.dart.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="72%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0F9F6E"/>
      <stop offset="100%" stop-color="#0A7A54"/>
    </radialGradient>
    <filter id="routeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="6" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.27"/>
      </feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <g>
    <!-- Soft drop shadow under the route. -->
    <path d="M 307 307 C 715 322 329 722 737 737"
          fill="none" stroke="#000000" stroke-opacity="0.27"
          stroke-width="76" stroke-linecap="round"
          filter="url(#routeShadow)"/>
    <!-- The route itself. -->
    <path d="M 307 307 C 715 322 329 722 737 737"
          fill="none" stroke="#FFFFFF"
          stroke-width="72" stroke-linecap="round"/>
  </g>

  <!-- Origin marker: white halo, green ring, deep-green core. -->
  <g>
    <circle cx="307" cy="307" r="95" fill="#FFFFFF"/>
    <circle cx="307" cy="307" r="70" fill="#0F9F6E"/>
    <circle cx="307" cy="307" r="34" fill="#085C40"/>
  </g>
  <!-- Destination marker. -->
  <g>
    <circle cx="737" cy="737" r="95" fill="#FFFFFF"/>
    <circle cx="737" cy="737" r="70" fill="#0F9F6E"/>
    <circle cx="737" cy="737" r="34" fill="#085C40"/>
  </g>
</svg>
